<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat selalu Sayang! ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg,#ffe5ec,#ffc2d1);
            overflow:hidden;
            padding:20px;
        }

        .popup-box{
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            padding:35px 25px;
            border-radius:24px;
            box-shadow:0 15px 35px rgba(255,77,109,0.15);
            width:100%;
            max-width:400px;
            text-align:center;
            border:2px solid #ffb3c6;
            animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }

        @keyframes popIn{
            0%{
                transform:scale(.8);
                opacity:0;
            }
            100%{
                transform:scale(1);
                opacity:1;
            }
        }

        .hidden{
            display:none !important;
        }

        h2{
            color:#ff4d6d;
            margin-bottom:15px;
            font-size:1.5rem;
            font-weight:600;
            transition: all 0.5s ease;
        }

        p{
            color:#4a4a4a;
            font-size:1rem;
            line-height:1.6;
            margin-bottom:25px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            filter: blur(0);
            transform: scale(1);
        }

        input[type="text"]{
            width:100%;
            padding:14px;
            border:2px solid #ffb3c6;
            border-radius:12px;
            outline:none;
            margin-bottom:25px;
            text-align:center;
            font-size:1rem;
            color:#4a4a4a;
            background-color:#fff;
            transition:all .3s ease;
        }

        input[type="text"]:focus{
            border-color:#ff4d6d;
            box-shadow:0 0 10px rgba(255,77,109,.2);
        }

        button{
            background:#ff4d6d;
            color:white;
            border:none;
            padding:12px 35px;
            border-radius:25px;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:all .3s ease;
            box-shadow:0 5px 15px rgba(255,77,109,.3);
            width:80%;
        }

        button:hover{
            background:#ff758f;
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(255,77,109,.4);
        }

        button:active{
            transform:translateY(1px);
        }

        .video-container{
            width:100%;
            border-radius:16px;
            overflow:hidden;
            border:3px solid #ffb3c6;
            margin-bottom:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.05);
            background-color:#000;
        }

        .video-container video{
            width:100%;
            height:250px;
            object-fit:cover;
            display:block;
        }

        .love-text{
            font-size:1.3rem; 
            color:#ff4d6d;
            font-weight:700;
            margin-bottom:20px;
            letter-spacing:1px;
            min-height: 2.0rem; 
        }
        
        .heartbeat-animation {
            animation: heartbeat 2.5s infinite ease-in-out;
        }

        @keyframes heartbeat{
            0%, 40%, 80%, 100%{ transform:scale(1); }
            20%{ transform:scale(1.06); } 
            60%{ transform:scale(1.10); }
        }

    </style>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="musikLatar" loop>
        <source src="musik-kita.mp3" type="audio/mp3">
    </audio>

    <div id="popup1" class="popup-box">
        <h2>Halo Sayangkuuu! ✨</h2>
        <p>Sebelum lanjut, masukkan nama kamu dulu cintaa</p>
        <input 
            type="text" 
            id="inputNama" 
            placeholder="Nama kamu..." 
            autocomplete="off"
        >
        <button id="btnPopup1" onclick="lanjutKePopup2()">Verification</button>
    </div>

    <div id="popup2" class="popup-box hidden">
        <h2 id="headerSemangat">Semangat Yaaaa! 🕊️</h2>
        <p id="ucapanTeks"></p>
        <button id="btnPopup2" class="hidden" onclick="lanjutKePopup3()">Next</button>
    </div>

    <div id="popup3" class="popup-box hidden">
        <div class="video-container">
            <video 
                id="videoKita"
                controls
                loop
                playsinline
            >
                <source src="Video Kita.mp4" type="video/mp4">
                Browser kamu tidak mendukung video.
            </video>
        </div>
        <div id="teksKetik" class="love-text"></div>
        <button id="btnPopup3" onclick="lanjutKePopup4()">Last Next Sayang</button>
    </div>

    <div id="popup4" class="popup-box hidden">
        <h2>Terima Kasih Udah Baca! 💌</h2>
        <p>kalau kamu sayang aku, klik tombol di bawah</p>
        <button id="btnPopup4" onclick="kirimWA()">Klik Aja</button>
    </div>

    <script>
        let namaUser = "";
        let currentPopup = 1;
        let bolehNextPopup2 = false; 

        // --- PEMBARUAN LOGIKA WAKTU REAL-TIME AKSES ---
        function dapatkanWaktu(){
            const jam = new Date().getHours();
            if(jam >= 0 && jam < 11){ return "selamat pagi"; }
            if(jam >= 11 && jam < 15){ return "selamat siang"; }
            if(jam >= 15 && jam < 19){ return "selamat sore"; }
            return "selamat malam";
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                if (currentPopup === 1) {
                    lanjutKePopup2();
                } else if (currentPopup === 2 && bolehNextPopup2) { 
                    lanjutKePopup3();
                } else if (currentPopup === 3) {
                    lanjutKePopup4();
                } else if (currentPopup === 4) {
                    kirimWA();
                }
            }
        });

        function lanjutKePopup2(){
            const input = document.getElementById('inputNama').value.trim();
            if(input === ""){
                alert("Namanya diisi dulu dong sayang 😊");
                return;
            }

            namaUser = input;
            const waktu = dapatkanWaktu();
            const elemenUcapan = document.getElementById('ucapanTeks');
            const tombolNext2 = document.getElementById('btnPopup2');

            tombolNext2.classList.add('hidden');
            bolehNextPopup2 = false;

            const musik = document.getElementById('musikLatar');
            musik.currentTime = 0; 
            musik.volume = 0.7;    
            musik.play().catch(err => console.log("Gagal memutar audio otomatis:", err));

            // --- STRUKTUR KALIMAT DENGAN KETERANGAN WAKTU BARU ---
            elemenUcapan.innerHTML = 
                `Haiii <b>${namaUser}</b>, ${waktu}.. 🥰<br><br>` +
                `Maaf ya, apabila selama bersamaku hidupmu jadi terasa terbebani. Maaf juga kalau aku belum bisa sepenuhnya kasih perhatian yang mungkin kamu harapkan dariku.. 🥀<br><br>` +
                `Aku sadar, aku hanya laki-laki sederhana yang ngga punya banyak harta. Tapi percayalah, aku mencintaimu dengan sepenuh hati dan menyayangimu dengan ikhlas.<br><br>` +
                `Aku akan selalu berusaha untuk menjadi laki-laki terbaikmu.. 🤍`;
            
            setTimeout(function() {
                elemenUcapan.style.opacity = "0";
                elemenUcapan.style.filter = "blur(8px)";
                elemenUcapan.style.transform = "scale(0.95)";
                
                setTimeout(function() {
                    elemenUcapan.innerHTML =
                        `Oya, <b>${namaUser} ☺️</b><br><br>` +
                        `Jangan lupa buat selalu jaga pola makan kamu, jaga ibadahmu, selalu semangat kuliahnya, sayang sama orang tua dan juga aku. bentar lagi KKN kan? aku jangan di lupain yaa... skripsinya juga jangan lupa dicicil dikit-dikit yaa sayangkuu... SEMANGATT!!!.<br><br>` +
                        `Maaf ya kalau aku baru bisa kasih sesuatu yang sesederhana ini 😔<br><br>` +
                        `Kamu ga boleh menyerah ya! Kalau ada masalah atau lagi capek, cerita aja ke aku. Aku bangga punya wanita sepertimu. Aku selalu mendukung dan ada di belakangmu untuk dengerin semua keluh kesah kamu ❤️`;
                    
                    elemenUcapan.style.filter = "blur(0)";
                    elemenUcapan.style.transform = "scale(1)";
                    elemenUcapan.style.opacity = "1";
                    
                    tombolNext2.classList.remove('hidden');
                    bolehNextPopup2 = true; 
                }, 600);
            }, 23000); 

            const video = document.getElementById('videoKita');
            video.load(); 

            document.getElementById('popup1').classList.add('hidden');
            document.getElementById('popup2').classList.remove('hidden');
            currentPopup = 2;
        }

        function lanjutKePopup3(){
            bolehNextPopup2 = false; 
            const elemenUcapan = document.getElementById('ucapanTeks');
            const tombolNext2 = document.getElementById('btnPopup2');
            const headerSemangat = document.getElementById('headerSemangat');
            
            tombolNext2.classList.add('hidden');
            headerSemangat.classList.add('hidden');

            const musik = document.getElementById('musikLatar');
            musik.pause();
            musik.currentTime = 0; 

            const alurKejutan = [
                "Oh ya, aku ada sedikit kenang-kenangan nihh...",
                "Siap-siap yaaa... 😄",
                "3...",
                "2...",
                "1...",
                "Ini diaaaa! 🎉"
            ];

            function gantiTeksDinamis(index) {
                if (index < alurKejutan.length) {
                    elemenUcapan.style.opacity = "0";
                    elemenUcapan.style.filter = "blur(8px)";
                    elemenUcapan.style.transform = "scale(0.95)";

                    setTimeout(() => {
                        elemenUcapan.innerHTML = `<br><br><span style="font-size: 1.3rem; font-weight: 600; color: #ff4d6d;">${alurKejutan[index]}</span>`;
                        
                        elemenUcapan.style.filter = "blur(0)";
                        elemenUcapan.style.transform = "scale(1)";
                        elemenUcapan.style.opacity = "1";

                        let jedaWaktu = (index === 0 || index === 1) ? 3000 : 1200;

                        setTimeout(() => {
                            gantiTeksDinamis(index + 1);
                        }, jedaWaktu);

                    }, 600);
                } else {
                    document.getElementById('popup2').classList.add('hidden');
                    document.getElementById('popup3').classList.remove('hidden');
                    currentPopup = 3;

                    const video = document.getElementById('videoKita');
                    video.muted = false;
                    video.volume = 1.0;
                    video.currentTime = 0;
                    
                    video.play().catch(error => {
                        console.log("Autoplay diblokir browser, menjalankan fallback...", error);
                        video.muted = true;
                        video.play().then(() => {
                            setTimeout(() => { video.muted = false; }, 100);
                        });
                    });

                    ketikTeks();
                }
            }

            gantiTeksDinamis(0);
        }

        function ketikTeks(){
            const teks = "I Love You Sayangkuu ❤️❤️";
            const elemenTeks = document.getElementById('teksKetik');
            elemenTeks.innerHTML = ""; 
            elemenTeks.classList.remove('heartbeat-animation'); 
            
            let i = 0;
            function ketik() {
                if (i < teks.length) {
                    elemenTeks.innerHTML += teks.charAt(i);
                    i++;
                    setTimeout(ketik, 250); 
                } else {
                    elemenTeks.classList.add('heartbeat-animation');
                }
            }
            setTimeout(ketik, 800); 
        }

        function lanjutKePopup4(){
            document.getElementById('popup3').classList.add('hidden');
            document.getElementById('popup4').classList.remove('hidden');
            currentPopup = 4;
        }

        function kirimWA(){
            const nomorWA = "6282327352166";
            const pesan = encodeURIComponent("i love you more Sayangg 🫶🏻");
            const urlWA = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${pesan}`;
            window.open(urlWA,'_blank');
        }
    </script>
</body>
</html>
